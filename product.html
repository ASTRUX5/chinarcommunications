<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Product – Chinar Communications</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700;1,6..96,400&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --black:#000;--void:#080808;--dark:#111;--card:#161616;
  --line:rgba(255,255,255,0.07);--line-hi:rgba(255,255,255,0.14);
  --gold:#D4AF37;--gold-lt:#E8CC6A;--gold-dim:rgba(212,175,55,0.14);
  --gold-glow:rgba(212,175,55,0.25);--plat:#F0EEE8;--white:#fff;
  --muted:#666;--faint:#2a2a2a;--red:#C0392B;--green:#27AE60;
  --f-d:'Bodoni Moda',Georgia,serif;--f-b:'Barlow',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:var(--black);color:var(--plat);font-family:var(--f-b);overflow-x:hidden;min-height:100vh}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:var(--f-b);border:none;background:none}
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-track{background:var(--black)}
::-webkit-scrollbar-thumb{background:var(--gold)}
.c{width:100%;max-width:1100px;margin:0 auto;padding:0 20px}

/* ── NAV ── */
.nav{position:fixed;top:0;left:0;right:0;z-index:700;height:60px;
  display:flex;align-items:center;
  background:rgba(0,0,0,0.92);backdrop-filter:blur(28px);
  border-bottom:1px solid var(--line)}
.nav-in{width:100%;max-width:1100px;margin:0 auto;padding:0 20px;
  display:flex;align-items:center;justify-content:space-between}
.back-btn{display:flex;align-items:center;gap:7px;color:var(--muted);
  font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;
  transition:color 0.2s;padding:8px 0}
.back-btn:hover{color:var(--gold)}
.nav-logo-wrap{display:flex;flex-direction:column;align-items:center;gap:1px}
.nav-logo-wrap img{height:28px;width:auto;object-fit:contain;
  filter:brightness(0) invert(1);transition:filter 0.3s}
.nav-logo-top{font-family:var(--f-d);font-size:15px;font-weight:700;
  color:var(--white);line-height:1;letter-spacing:0.5px}
.nav-logo-bot{font-size:7px;font-weight:500;letter-spacing:4px;
  text-transform:uppercase;color:var(--gold);line-height:1}
.nav-cart{width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  color:var(--muted);border-radius:8px;transition:all 0.2s;position:relative}
.nav-cart:hover{color:var(--white);background:var(--dark)}
.cdot{position:absolute;top:6px;right:6px;width:14px;height:14px;
  background:var(--gold);color:var(--black);font-size:8px;font-weight:700;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--f-b)}

/* ── CART DRAWER ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(4px);
  z-index:800;opacity:0;pointer-events:none;transition:opacity 0.3s}
.ov.on{opacity:1;pointer-events:all}
.dr{position:fixed;top:0;right:0;bottom:0;width:min(400px,100vw);
  background:var(--void);border-left:1px solid var(--line);
  z-index:810;transform:translateX(100%);
  transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);
  display:flex;flex-direction:column}
.dr.on{transform:translateX(0)}
.dr-h{display:flex;align-items:center;justify-content:space-between;
  padding:20px;border-bottom:1px solid var(--line);flex-shrink:0}
.dr-title{font-family:var(--f-d);font-size:20px;font-weight:700;color:var(--white)}
.dr-close{width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  background:var(--dark);border:1px solid var(--line);
  border-radius:8px;color:var(--muted);transition:all 0.2s}
.dr-close:hover{color:var(--white);border-color:var(--line-hi)}
.dr-body{flex:1;overflow-y:auto;padding:12px}
.cart-empty{height:100%;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;color:var(--muted);text-align:center;padding:20px}
.ci{display:flex;gap:12px;padding:12px;background:var(--dark);
  border:1px solid var(--line);border-radius:12px;margin-bottom:8px}
.ci-img{width:68px;height:68px;flex-shrink:0;background:var(--card);
  border-radius:8px;overflow:hidden}
.ci-img img{width:100%;height:100%;object-fit:cover}
.ci-info{flex:1;min-width:0}
.ci-brand{font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:var(--gold);font-weight:600}
.ci-name{font-size:13px;font-weight:600;color:var(--white);
  margin:3px 0 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-price{font-family:var(--f-d);font-size:16px;color:var(--plat)}
.ci-qty{display:flex;align-items:center;gap:8px;margin-top:7px}
.qb{width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  background:var(--card);border:1px solid var(--line);
  border-radius:6px;color:var(--muted);transition:all 0.2s}
.qb:hover{border-color:var(--gold);color:var(--gold)}
.qv{font-size:13px;font-weight:700;width:18px;text-align:center;color:var(--white)}
.ci-del{color:var(--faint);padding:4px;align-self:flex-start;
  margin-left:auto;transition:color 0.2s;display:flex}
.ci-del:hover{color:var(--red)}
.dr-foot{padding:16px 20px;border-top:1px solid var(--line);flex-shrink:0}
.cart-tot-r{display:flex;justify-content:space-between;
  align-items:baseline;margin-bottom:14px}
.cart-tot-l{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
.cart-tot-a{font-family:var(--f-d);font-size:26px;color:var(--white)}
.btn-gold{display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;background:var(--gold);color:var(--black);
  padding:14px 28px;border-radius:8px;font-family:var(--f-b);
  font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;
  transition:all 0.25s}
.btn-gold:hover{background:var(--gold-lt);transform:translateY(-2px);
  box-shadow:0 12px 40px var(--gold-glow)}
.btn-back-shop{width:100%;margin-top:10px;padding:13px;
  border:1px solid var(--line);border-radius:8px;
  color:var(--muted);font-family:var(--f-b);font-size:11px;
  font-weight:500;letter-spacing:2px;text-transform:uppercase;
  display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s}
.btn-back-shop:hover{color:var(--white);border-color:var(--line-hi)}

/* ── CHECKOUT MODAL ── */
.modal-bg{position:fixed;inset:0;z-index:960;background:rgba(0,0,0,0.92);
  backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;
  padding:16px;opacity:0;pointer-events:none;transition:opacity 0.3s}
.modal-bg.on{opacity:1;pointer-events:all}
.modal{background:var(--void);border:1px solid var(--line-hi);border-radius:16px;
  width:100%;max-width:460px;max-height:90vh;overflow-y:auto;padding:24px}
.modal h3{font-family:var(--f-d);font-size:22px;font-weight:700;
  color:var(--white);margin-bottom:18px}
.os-box{background:var(--dark);border:1px solid var(--line);
  border-radius:10px;padding:14px;margin-bottom:18px}
.os-t{font-size:9px;letter-spacing:3px;text-transform:uppercase;
  color:var(--gold);font-weight:600;margin-bottom:10px}
.os-r{display:flex;justify-content:space-between;font-size:12px;
  padding:3px 0;color:var(--muted)}
.os-r strong{color:var(--plat)}
.os-tot{display:flex;justify-content:space-between;align-items:baseline;
  border-top:1px solid var(--line);padding-top:10px;margin-top:6px;
  font-family:var(--f-d);font-size:18px;color:var(--white)}
.ff{margin-bottom:12px}
.ff label{display:block;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--muted);font-weight:500;margin-bottom:6px}
.ff input,.ff select,.ff textarea{width:100%;background:var(--dark);
  border:1px solid var(--line);border-radius:8px;padding:11px 13px;
  color:var(--white);font-family:var(--f-b);font-size:13px;
  outline:none;transition:border-color 0.2s}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--gold)}
.ff select option{background:var(--dark)}
.ff textarea{resize:none;height:70px}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:400px){.f2{grid-template-columns:1fr}}
.btn-wa{display:flex;align-items:center;justify-content:center;gap:9px;
  width:100%;background:#25D366;color:#fff;padding:14px;
  border-radius:10px;font-family:var(--f-b);font-size:11px;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;transition:all 0.2s}
.btn-wa:hover{background:#1aad56;transform:translateY(-1px)}

/* ── PRODUCT LAYOUT ── */
.product-layout{display:grid;grid-template-columns:1fr;gap:28px;padding-bottom:60px}
@media(min-width:768px){
  .product-layout{grid-template-columns:1fr 1fr;gap:52px;align-items:start}
}
.gallery{position:static}
@media(min-width:768px){.gallery{position:sticky;top:80px}}

/* ── MAIN IMAGE STRIP (horizontal slider) ── */
.img-strip-wrap{
  position:relative;
  border-radius:16px;overflow:hidden;
  background:var(--dark);border:1px solid var(--line);
  margin-bottom:10px;
  /* no fixed aspect-ratio — height adapts to image */
  min-height:200px;
}
.img-strip{
  display:flex;
  transition:transform 0.45s cubic-bezier(0.4,0,0.2,1);
  will-change:transform;
  height:100%;
}
.img-slide{
  flex:0 0 100%;width:100%;
  display:flex;align-items:center;justify-content:center;
  padding:12px;min-height:240px;
  cursor:zoom-in;
}
.img-slide img{
  max-width:100%;max-height:70vh;
  width:auto;height:auto;
  object-fit:contain;
  border-radius:6px;
  display:block;
  user-select:none;-webkit-user-drag:none;
}

/* Progress dots */
.img-dots{
  display:flex;align-items:center;justify-content:center;
  gap:6px;margin-bottom:10px;min-height:10px;
}
.img-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--faint);transition:all 0.3s;cursor:pointer;
}
.img-dot.on{background:var(--gold);width:18px;border-radius:3px}

/* Progress bar */
.img-prog-wrap{height:2px;background:var(--line);border-radius:50px;
  overflow:hidden;margin-bottom:10px;opacity:0;transition:opacity 0.3s}
.img-prog-wrap.vis{opacity:1}
.img-prog-bar{height:100%;background:var(--gold);border-radius:50px;
  width:0;transition:width 0.1s linear}

/* Thumbs */
.thumbs-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.thumbs-row::-webkit-scrollbar{height:0}
.thumb{width:60px;height:76px;flex-shrink:0;border-radius:8px;overflow:hidden;
  border:2px solid var(--line);cursor:pointer;transition:border-color 0.2s;
  background:var(--dark);display:flex;align-items:center;justify-content:center}
.thumb:hover,.thumb.on{border-color:var(--gold)}
.thumb img{max-width:88%;max-height:88%;width:auto;height:auto;object-fit:contain}

/* ── LIGHTBOX ── */
.lb{
  position:fixed;inset:0;z-index:9900;
  background:rgba(0,0,0,0.97);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 0.28s;
  padding:20px;
  touch-action:none;/* handled manually for pinch zoom */
}
.lb.on{opacity:1;pointer-events:all}
.lb-img-wrap{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  transform:scale(0.88);
  transition:transform 0.35s cubic-bezier(0.34,1.5,0.64,1);
}
.lb.on .lb-img-wrap{transform:scale(1)}
.lb-img-wrap img{
  max-width:min(90vw,480px);max-height:82vh;
  width:auto;height:auto;object-fit:contain;
  border-radius:10px;
  user-select:none;-webkit-user-drag:none;
  /* pinch zoom applied via JS transform */
  transform-origin:center center;
}
.lb-close{
  position:absolute;top:16px;right:16px;
  width:40px;height:40px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
  border-radius:10px;color:rgba(255,255,255,0.7);
  transition:all 0.2s;z-index:2;
}
.lb-close:hover{background:rgba(255,255,255,0.15);color:#fff}
.lb-hint{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  font-size:10px;letter-spacing:2.5px;text-transform:uppercase;
  color:rgba(255,255,255,0.2);pointer-events:none;white-space:nowrap;
}

/* ── PRODUCT INFO ── */
.prod-brand-tag{display:inline-flex;align-items:center;gap:6px;
  border:1px solid rgba(212,175,55,0.25);background:var(--gold-dim);
  padding:5px 12px;border-radius:50px;margin-bottom:12px}
.prod-brand-tag span{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--gold);font-weight:600}
.prod-title{font-family:var(--f-d);font-size:clamp(24px,5vw,36px);
  font-weight:700;color:var(--white);line-height:1.15;margin-bottom:14px}
.prod-price-row{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.prod-price{font-family:var(--f-d);font-size:clamp(28px,5vw,38px);
  font-weight:700;color:var(--white)}
.prod-badge{background:var(--gold);color:var(--black);font-size:9px;
  font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:4px 9px;border-radius:4px}
.prod-desc{font-size:14px;color:var(--muted);line-height:1.8;
  margin-bottom:22px;font-weight:300}
.act-row{display:flex;gap:10px;margin-bottom:20px}
.btn-add{flex:1;background:var(--gold);color:var(--black);
  padding:14px 20px;border-radius:8px;font-family:var(--f-b);
  font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;
  transition:all 0.25s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-add:hover{background:var(--gold-lt);transform:translateY(-2px);
  box-shadow:0 12px 40px var(--gold-glow)}
.btn-wa-sm{background:#25D366;color:#fff;padding:14px 16px;
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  transition:all 0.2s}
.btn-wa-sm:hover{background:#1aad56;transform:translateY(-2px)}
.trust-row{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:20px}
.trust-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.trust-item svg{flex-shrink:0}
.specs-box{background:var(--dark);border:1px solid var(--line);
  border-radius:12px;overflow:hidden}
.specs-head{padding:12px 16px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:8px}
.specs-head-lbl{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--gold);font-weight:600}
.spec-row{display:grid;grid-template-columns:130px 1fr;gap:10px;
  padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:13px}
.spec-row:nth-child(even){background:rgba(255,255,255,0.01)}
.spec-row:last-child{border-bottom:none}
.spec-k{color:var(--muted)}
.spec-v{color:var(--plat);font-weight:500}

/* ── RELATED ── */
.related-section{padding:0 0 60px}
.rel-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(min-width:480px){.rel-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:768px){.rel-grid{grid-template-columns:repeat(4,1fr)}}
.rel-card{background:var(--card);border:1px solid var(--line);
  border-radius:12px;overflow:hidden;display:block;
  transition:all 0.3s}
.rel-card:hover{border-color:rgba(212,175,55,0.3);transform:translateY(-4px)}
.rel-card-thumb{aspect-ratio:1;background:var(--dark);overflow:hidden}
.rel-card-thumb img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s}
.rel-card:hover .rel-card-thumb img{transform:scale(1.06)}
.rel-card-body{padding:10px 12px 12px}
.rel-brand{font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:var(--gold);font-weight:600;margin-bottom:3px}
.rel-name{font-size:12px;font-weight:600;color:var(--white);
  margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;line-height:1.35}
.rel-price{font-family:var(--f-d);font-size:16px;color:var(--plat)}
.divider{height:1px;background:var(--line);margin:32px 0}
.eyebrow{font-size:10px;font-weight:500;letter-spacing:4px;
  text-transform:uppercase;color:var(--gold);display:block;margin-bottom:8px}
.sec-title{font-family:var(--f-d);font-size:clamp(22px,4vw,30px);
  font-weight:700;color:var(--white);margin-bottom:20px}
.sec-title em{color:var(--gold-lt);font-style:italic}

/* ── BREADCRUMB ── */
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:11px;
  color:var(--muted);padding:80px 0 16px;flex-wrap:wrap}
.breadcrumb a{color:var(--muted);transition:color 0.2s}
.breadcrumb a:hover{color:var(--gold)}
.breadcrumb span{color:var(--plat)}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--dark);border:1px solid var(--gold);
  color:var(--gold-lt);padding:11px 22px;border-radius:50px;
  font-size:12px;font-weight:500;letter-spacing:0.5px;
  white-space:nowrap;z-index:9999;opacity:0;
  transition:all 0.3s;pointer-events:none;
  box-shadow:0 8px 32px rgba(0,0,0,0.6)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{border-color:var(--red);color:#e07070}

/* ── NOT FOUND ── */
.nf{min-height:70vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  gap:12px;color:var(--muted);padding:40px 20px}
.nf h2{font-family:var(--f-d);font-size:28px;color:var(--white);font-weight:400}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-in">
    <!-- BACK — goes to previous page, not home -->
    <a href="#" onclick="history.length>1?history.back():window.location='index.html';return false;" class="back-btn">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      <span style="display:none" id="backLabel">Back</span>
    </a>
    <a href="index.html" class="nav-logo-wrap">
      <img src="logo.png" alt="Chinar" onerror="this.style.display='none'">
      <span class="nav-logo-top">Chinar</span>
      <span class="nav-logo-bot">Communications</span>
    </a>
    <button class="nav-cart" onclick="openCart()" title="Cart">
      <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" stroke-linecap="round"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <span class="cdot" id="cdot">0</span>
    </button>
  </div>
</nav>

<!-- CART DRAWER -->
<div class="ov" id="ov" onclick="closeCart()"></div>
<div class="dr" id="dr">
  <div class="dr-h">
    <span class="dr-title">Cart</span>
    <button class="dr-close" onclick="closeCart()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="dr-body" id="drBody"></div>
  <div class="dr-foot" id="drFoot" style="display:none">
    <div class="cart-tot-r">
      <span class="cart-tot-l">Total</span>
      <span class="cart-tot-a" id="cartTotal">₹0</span>
    </div>
    <button class="btn-gold" onclick="openCheckout()">Proceed to Checkout</button>
    <button class="btn-back-shop" onclick="closeCart()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Continue Shopping
    </button>
  </div>
</div>

<!-- CHECKOUT MODAL -->
<div class="modal-bg" id="checkModal">
  <div class="modal">
    <h3>Complete Order</h3>
    <div class="os-box">

// ═══════════════════════════════
// GALLERY ENGINE
// ═══════════════════════════════
let gImgs = [];
let gIdx = 0;
let gTimer = null;
let gInterrupted = false;
const G_DELAY = 3500;

function initGallery(imgs) {
  gImgs = imgs;
  gIdx = 0;
  gInterrupted = false;
  if (imgs.length > 1) startSlide();
}

function goToSlide(idx, userTriggered) {
  if (userTriggered) {
    gInterrupted = true;
    stopSlide();
  }
  gIdx = Math.max(0, Math.min(idx, gImgs.length - 1));
  // Move strip
  const strip = document.getElementById('imgStrip');
  if (strip) strip.style.transform = `translateX(-${gIdx * 100}%)`;
  // Sync dots
  document.querySelectorAll('.img-dot').forEach((d, i) => d.classList.toggle('on', i === gIdx));
  // Sync thumbs
  document.querySelectorAll('.thumb').forEach((t, i) => {
    t.classList.toggle('on', i === gIdx);
    if (i === gIdx) t.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
  });
  // Reset progress
  if (!gInterrupted) animateProgress();
}

function startSlide() {
  stopSlide();
  if (gImgs.length <= 1 || gInterrupted) return;
  animateProgress();
  gTimer = setTimeout(function next() {
    if (gInterrupted) return;
    if (gIdx < gImgs.length - 1) {
      gIdx++;
      goToSlide(gIdx, false);
      gTimer = setTimeout(next, G_DELAY);
    }
    // Stop at last — no loop
  }, G_DELAY);
}

function stopSlide() {
  clearTimeout(gTimer);
  gTimer = null;
  // Stop progress bar
  const bar = document.getElementById('imgProgBar');
  if (bar) { bar.style.transition = 'none'; bar.style.width = bar.style.width; }
}

function animateProgress() {
  const bar = document.getElementById('imgProgBar');
  if (!bar) return;
  bar.style.transition = 'none';
  bar.style.width = '0%';
  bar.offsetHeight; // force reflow
  bar.style.transition = `width ${G_DELAY}ms linear`;
  bar.style.width = '100%';
}

// ═══════════════════════════════
// LIGHTBOX + PINCH ZOOM
// ═══════════════════════════════
let lbOpen = false;
let lbScale = 1, lbLastScale = 1;
let lbDist0 = 0;

function openLb(src) {
  const img = document.getElementById('lbImg');
  img.src = src;
  img.style.transform = 'scale(1)';
  lbScale = 1; lbLastScale = 1;
  document.getElementById('lb').classList.add('on');
  document.body.style.overflow = 'hidden';
  lbOpen = true;
  stopSlide(); // pause while lightbox open
}

function closeLb() {
  document.getElementById('lb').classList.remove('on');
  document.body.style.overflow = '';
  lbOpen = false;
  // Don't resume if user already interrupted
}

function lbTap(e) {
  if (e.target === document.getElementById('lb') || e.target === document.querySelector('.lb-hint')) {
    closeLb();
  }
}

// Pinch zoom on lightbox image
const lbEl = document.getElementById('lb');
lbEl.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    lbDist0 = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: true });

lbEl.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    lbScale = Math.min(4, Math.max(1, lbLastScale * (dist / lbDist0)));
    const img = document.getElementById('lbImg');
    img.style.transition = 'none';
    img.style.transform = `scale(${lbScale})`;
  }
}, { passive: false });

lbEl.addEventListener('touchend', e => {
  if (e.touches.length < 2) {
    lbLastScale = lbScale;
    if (lbScale <= 1) {
      const img = document.getElementById('lbImg');
      img.style.transition = 'transform 0.25s ease';
      img.style.transform = 'scale(1)';
      lbScale = 1; lbLastScale = 1;
    }
  }
}, { passive: true });

// Mouse wheel zoom in lightbox
lbEl.addEventListener('wheel', e => {
  if (!lbOpen) return;
  e.preventDefault();
  lbScale = Math.min(4, Math.max(1, lbScale - e.deltaY * 0.003));
  lbLastScale = lbScale;
  const img = document.getElementById('lbImg');
  img.style.transition = 'transform 0.1s ease';
  img.style.transform = `scale(${lbScale})`;
}, { passive: false });

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb(); });

}

      <p class="ci-price">${fmtP(it.price)}</p>
      <div class="ci-qty">
        <button class="qb" onclick="chgQty('${it.id}',-1)"><svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        <span class="qv">${it.qty}</span>
        <button class="qb" onclick="chgQty('${it.id}',1)"><svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      </div>
    </div>
    <button class="ci-del" onclick="removeItem('${it.id}')"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>
  </div>`).join('');
  document.getElementById('cartTotal').textContent=fmtP(cart.reduce((s,x)=>s+parseFloat(x.price)*x.qty,0));
  foot.style.display='block';
}
function openCheckout(){if(!cart.length)return;document.getElementById('chkItems').innerHTML=cart.map(it=>`<div class="os-r"><span>${it.name} ×${it.qty}</span><strong>${fmtP(parseFloat(it.price)*it.qty)}</strong></div>`).join('');document.getElementById('chkTotal').textContent=fmtP(cart.reduce((s,x)=>s+parseFloat(x.price)*x.qty,0));document.getElementById('checkModal').classList.add('on');}
function closeCheckout(){document.getElementById('checkModal').classList.remove('on');}
function placeOrder(){
  const name=document.getElementById('cName').value.trim(),phone=document.getElementById('cPhone').value.trim(),addr=document.getElementById('cAddr').value.trim(),area=document.getElementById('cArea').value.trim(),dist=document.getElementById('cDist').value,notes=document.getElementById('cNotes').value.trim();
  if(!name||!phone||!addr){showToast('Please fill all required fields','err');return;}
  const total=cart.reduce((s,x)=>s+parseFloat(x.price)*x.qty,0);
  const lines=cart.map(it=>`  • ${it.brand?it.brand+' ':''}${it.name} ×${it.qty} — ${fmtP(parseFloat(it.price)*it.qty)}`).join('\n');
  const msg=`🛍️ *NEW ORDER — CHINAR COMMUNICATIONS*\n━━━━━━━━━━━━━\n👤 ${name}\n📞 ${phone}\n📍 ${addr}${area?', '+area:''}${dist?', '+dist:''}, J&K\n\n*Items:*\n${lines}\n\n💰 *TOTAL: ${fmtP(total)}*${notes?'\n\n📝 '+notes:''}\n━━━━━━━━━━━━━\n_Order via chinarcommunications.pages.dev_`;
  window.open(`https://wa.me/919797333633?text=${encodeURIComponent(msg)}`,'_blank');
  cart=[];saveCart();updateCartUI();closeCheckout();closeCart();showToast('Order sent! 🎉');
}
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast on${type?' '+type:''}`;setTimeout(()=>t.classList.remove('on'),3000);}
</script>
